<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Almoxarifado - SENAC Enfermagem</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>Almoxarifado de Saúde</h1>
        <p>SENAC Zona Norte &mdash; Curso Técnico de Enfermagem</p>
    </header>

    <main>

        <section class="form-section">
            <h2>Cadastrar Material</h2>
            <div class="form-grid">
                <input type="text" id="input-nome" placeholder="Nome do material" />
                <input type="number" id="input-quantidade" placeholder="Quantidade" min="1" />
                <button id="btn-cadastrar">Cadastrar</button>
            </div>
        </section>

        <section class="lista-section">
            <h2>Materiais em Estoque</h2>
            <div id="lista-materiais">
                <p class="sem-resultados">Carregando materiais...</p>
            </div>
        </section>

    </main>

    <div id="modal-retirada" class="modal-overlay" style="display:none">
        <div class="modal-box">
            <h3>Registrar Retirada</h3>
            <p id="modal-info"></p>
            <input type="number" id="input-retirada" placeholder="Quantidade a retirar" min="1" />
            <div class="modal-botoes">
                <button id="btn-confirmar-retirada">Confirmar</button>
                <button id="btn-fechar-modal">Cancelar</button>
            </div>
        </div>
    </div>

    <script src="main.js"></script>
</body>
</html>
